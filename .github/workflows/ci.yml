name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check Python syntax
        run: python -m py_compile tools/memory-query.py && python -m py_compile tools/regen-index.py && python -m py_compile tools/backfill.py
      - name: Validate examples have frontmatter
        run: |
          for f in examples/*.md template/.claude/projects/example-project/memory/*.md; do
            if [ -f "$f" ] && [ "$(basename "$f")" != "MEMORY.md" ]; then
              head -1 "$f" | grep -q "^---" || (echo "Missing frontmatter: $f" && exit 1)
            fi
          done
